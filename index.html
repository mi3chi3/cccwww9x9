<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar</title>

<style>
body {font-family:sans-serif;margin:0;background:#F7F4F2;}
.header{display:flex;justify-content:center;gap:20px;padding:10px;}
.week,.calendar{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;}
.calendar{padding:10px;gap:6px;}

.day{background:white;border-radius:12px;height:95px;padding:5px;position:relative;}
.date{width:24px;height:24px;border-radius:50%;line-height:24px;margin:auto;}
.today .date{background:red;color:white;}

.event{margin-top:4px;border-radius:6px;font-size:12px;padding:2px;color:white;}

.nextTrash{
  position:absolute;bottom:6px;right:6px;
  width:14px;height:14px;border-radius:50%;
  background:rgba(100,150,255,0.4);
}

.modal{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;background:rgba(0,0,0,0.3);}
.hidden{display:none;}
.box{background:white;padding:20px;border-radius:12px;width:90%;max-width:300px;}

.colors{display:flex;gap:10px;margin:10px 0;}
.color{width:30px;height:30px;border-radius:50%;}
.selected{outline:3px solid black;}

textarea{width:100%;margin-top:5px;}
</style>
</head>

<body>

<div class="header">
<button id="prev">◀</button>
<div id="month"></div>
<button id="next">▶</button>
</div>

<div class="week">
<div>月</div><div>火</div><div>水</div>
<div>木</div><div>金</div><div>土</div><div>日</div>
</div>

<div id="calendar" class="calendar"></div>

<!-- イベント -->
<div id="modal" class="modal hidden">
<div class="box">
<input id="title" placeholder="タイトル">

<div class="colors">
<div class="color selected" data="#E8A0B8" style="background:#E8A0B8"></div>
<div class="color" data="#7EC3D8" style="background:#7EC3D8"></div>
<div class="color" data="#F5D547" style="background:#F5D547"></div>
<div class="color" data="#A8E6CF" style="background:#A8E6CF"></div>
</div>

<textarea id="memo" placeholder="メモ"></textarea>

<button id="save">保存</button>
<button id="close">戻る</button>
</div>
</div>

<!-- ゴミ -->
<div id="trashModal" class="modal hidden">
<div class="box">
<div id="trashText"></div>

<select id="trashSelect">
<option value="">変更なし</option>
<option value="🔥">🔥</option>
<option value="♻️">♻️</option>
<option value="🍾🥫">🍾🥫</option>
<option value="🔋🪥">🔋🪥</option>
<option value="👔">👔</option>
<option value="📦">📦</option>
</select>

<button id="trashSave">保存</button>
<button id="trashClose">戻る</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"myc2-fe880.firebaseapp.com",
  projectId:"myc2-fe880"
});
const db = getFirestore(app);

let month=new Date().getMonth()+1;
let year=new Date().getFullYear();
let selectedDay=null;
let editingIndex=null;
let color="#E8A0B8";

let events={};
let trashOverrides={};

function key(){return `${year}-${month}`;}
function tkey(d){return `${key()}-${d}`;}

document.querySelectorAll(".color").forEach(c=>{
  c.onclick=()=>{
    document.querySelectorAll(".color").forEach(x=>x.classList.remove("selected"));
    c.classList.add("selected");
    color=c.getAttribute("data");
  }
});

function getTrash(day){
  let date=new Date(year,month-1,day);
  let wd=date.getDay();
  let week=Math.ceil(day/7);

  if(wd===1)return"♻️";
  if(wd===2||wd===4)return"🔥";
  if(wd===3){
    if(week===1||week===3)return"🍾🥫";
    if(week===2||week===4)return"🔋🪥";
  }
  if(wd===5){
    if(week===2)return"👔";
    if(week===4)return"📦";
  }
  return"";
}

onSnapshot(doc(db,"calendar","shared"),snap=>{
  if(snap.exists()){
    let d=snap.data();
    events=d.events||{};
    trashOverrides=d.trashOverrides||{};
    render();
  }
});

async function save(){
  await setDoc(doc(db,"calendar","shared"),{events,trashOverrides},{merge:true});
}

function render(){
  let cal=document.getElementById("calendar");
  cal.innerHTML="";
  document.getElementById("month").innerText=`${year}/${month}`;

  let first=(new Date(year,month-1,1).getDay()+6)%7;
  let last=new Date(year,month,0).getDate();
  let today=new Date();

  for(let i=0;i<first;i++)cal.appendChild(document.createElement("div"));

  for(let d=1;d<=last;d++){
    let div=document.createElement("div");
    div.className="day";

    let date=document.createElement("div");
    date.className="date";
    date.innerText=d;

    if(d===today.getDate()&&month===today.getMonth()+1&&year===today.getFullYear()){
      div.classList.add("today");
    }

    div.appendChild(date);

    if(events[key()]?.[d]){
      events[key()][d].forEach((e,i)=>{
        let ev=document.createElement("div");
        ev.className="event";
        ev.style.background=e.color||"#999";
        ev.innerText=e.title;

        ev.onclick=(x)=>{
          x.stopPropagation();
          selectedDay=d;
          editingIndex=i;

          document.getElementById("title").value=e.title;
          document.getElementById("memo").value=e.memo||"";
          color=e.color||"#E8A0B8";

          document.querySelectorAll(".color").forEach(c=>{
            c.classList.remove("selected");
            if(c.getAttribute("data")===color) c.classList.add("selected");
          });

          modal.classList.remove("hidden");
        };

        div.appendChild(ev);
      });
    }

    let next=d+1;
    if(next<=last){
      let val=trashOverrides[tkey(next)]??getTrash(next);
      if(val){
        let dot=document.createElement("div");
        dot.className="nextTrash";
        dot.onclick=(e)=>{
          e.stopPropagation();
          selectedDay=next;
          document.getElementById("trashText").innerText=`翌日のゴミ：${val}`;
          trashModal.classList.remove("hidden");
        };
        div.appendChild(dot);
      }
    }

    div.ondblclick=()=>{
      selectedDay=d;
      editingIndex=null;
      document.getElementById("title").value="";
      document.getElementById("memo").value="";
      modal.classList.remove("hidden");
    };

    cal.appendChild(div);
  }
}

// ✅ 修正済みここ
document.getElementById("save").onclick=async()=>{
  let k=key();
  let titleVal=document.getElementById("title").value;
  let memoVal=document.getElementById("memo").value;

  if(!events[k])events[k]={};
  if(!events[k][selectedDay])events[k][selectedDay]=[];

  if(editingIndex!==null){
    events[k][selectedDay][editingIndex]={title:titleVal,memo:memoVal,color};
  }else{
    events[k][selectedDay].push({title:titleVal,memo:memoVal,color});
  }

  await save();
  modal.classList.add("hidden");
};

document.getElementById("trashSave").onclick=async()=>{
  let val=document.getElementById("trashSelect").value;
  if(val==="") delete trashOverrides[tkey(selectedDay)];
  else trashOverrides[tkey(selectedDay)]=val;

  await save();
  trashModal.classList.add("hidden");
};

document.getElementById("close").onclick=()=>modal.classList.add("hidden");
document.getElementById("trashClose").onclick=()=>trashModal.classList.add("hidden");

document.getElementById("prev").onclick=()=>{month--;if(month<1){month=12;year--;}render();}
document.getElementById("next").onclick=()=>{month++;if(month>12){month=1;year++;}render();}
</script>

</body>
</html>
