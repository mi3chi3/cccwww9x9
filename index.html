<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar</title>

<style>
body {font-family:sans-serif;margin:0;background:#fffef5;}

.header{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:10px;
}

.week,.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  text-align:center;
}

.calendar{
  padding:10px;
  gap:6px;
}

.day{
  background:white;
  border-radius:12px;
  height:95px;
  padding:5px;
  position:relative;
}

.date{
  width:24px;
  height:24px;
  border-radius:50%;
  line-height:24px;
  margin:auto;
}

.today .date{
  background:red;
  color:white;
}

.holiday{
  background: rgba(255, 165, 0, 0.2);
}

.event{
  margin-top:4px;
  border-radius:6px;
  font-size:12px;
  padding:2px;
  color:white;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}

.nextTrash{
  position:absolute;
  bottom:6px;
  right:6px;
  width:14px;
  height:14px;
  border-radius:50%;
  background:rgba(100,150,255,0.4);
}

.modal{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.3);
  z-index:1000;
}

.hidden{display:none;}

.box{
  background:white;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:300px;
}

.colors{
  display:flex;
  gap:10px;
  margin:10px 0;
}

.color{
  width:30px;
  height:30px;
  border-radius:50%;
  flex:0 0 auto;
}

.selected{outline:3px solid black;}

textarea{
  width:100%;
  min-height:80px;
  margin-top:5px;
  box-sizing:border-box;
}

button, select, input, textarea{
  font:inherit;
}

#save, #trashSave{
  margin-top:10px;
}

#delete{
  margin-top:10px;
  background:#ff4d4d;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:6px;
}

#save, #close, #trashSave, #trashClose{
  border:none;
  padding:8px 12px;
  border-radius:6px;
}

#save, #trashSave{
  background:#333;
  color:white;
}

#close, #trashClose{
  background:#ddd;
}
</style>
</head>

<body>

<div class="header">
  <button id="prev">◀</button>
  <div id="month"></div>
  <button id="next">▶</button>
</div>

<div class="week">
  <div>月</div><div>火</div><div>水</div>
  <div>木</div><div>金</div><div>土</div><div>日</div>
</div>

<div id="calendar" class="calendar"></div>

<div id="eventModal" class="modal hidden">
  <div class="box">
    <input id="title" placeholder="タイトル">

    <div class="colors">
      <div class="color selected" data-color="#fa9bbb" style="background:#fa9bbb"></div>
      <div class="color" data-color="#9bd5fa" style="background:#9bd5fa"></div>
      <div class="color" data-color="#dca8ff" style="background:#dca8ff"></div>
      <div class="color" data-color="#000000" style="background:#000000"></div>
    </div>

    <textarea id="memo" placeholder="メモ"></textarea>

    <button id="save">保存</button>
    <button id="delete" style="display:none;">削除</button>
    <button id="close">戻る</button>
  </div>
</div>

<div id="trashModal" class="modal hidden">
  <div class="box">
    <div id="trashText"></div>

    <select id="trashSelect">
      <option value="">変更なし</option>
      <option value="🔥">🔥</option>
      <option value="プラ">プラ</option>
      <option value="ビン・カン">ビン・カン</option>
      <option value="電池・破砕">電池・破砕</option>
      <option value="古着・家電">古着・家電</option>
      <option value="📦">📦</option>
      <option value="ペットボトル">ペットボトル</option>
      <option value="なし">なし</option>
    </select>

    <button id="trashSave">保存</button>
    <button id="trashClose">戻る</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyDLlxAgxvT94--DAiErKdhGsb6-mX8bA8s",
  authDomain: "myc2-fe880.firebaseapp.com",
  projectId: "myc2-fe880",
  storageBucket: "myc2-fe880.firebasestorage.app",
  messagingSenderId: "691622220518",
  appId: "1:691622220518:web:505cc34778cddf91d5e127"
});

const db = getFirestore(app);

const cal = document.getElementById("calendar");
const eventModal = document.getElementById("eventModal");
const trashModal = document.getElementById("trashModal");
const titleInput = document.getElementById("title");
const memoInput = document.getElementById("memo");
const deleteBtn = document.getElementById("delete");
const colorEls = document.querySelectorAll(".color");
const trashSelect = document.getElementById("trashSelect");

let month = new Date().getMonth() + 1;
let year = new Date().getFullYear();

let selectedDay = null;
let editingIndex = null;
let color = "#fa9bbb";

let events = {};
let trashOverrides = {};
let holidays = [];

function key() {
  return `${year}-${month}`;
}

function tkey(d) {
  return `${key()}-${d}`;
}

function openEventModal() {
  eventModal.classList.remove("hidden");
}

function closeEventModal() {
  eventModal.classList.add("hidden");
}

function openTrashModal() {
  trashModal.classList.remove("hidden");
}

function closeTrashModal() {
  trashModal.classList.add("hidden");
}

function setSelectedColor(nextColor) {
  color = nextColor || "#fa9bbb";
  colorEls.forEach(c => {
    c.classList.toggle("selected", c.getAttribute("data-color") === color);
  });
}

colorEls.forEach(c => {
  c.onclick = () => setSelectedColor(c.getAttribute("data-color"));
});

async function fetchHolidays() {
  const res = await fetch(
    "https://www.googleapis.com/calendar/v3/calendars/ja.japanese%23holiday%40group.v.calendar.google.com/events?key=AIzaSyD91OacuI4DYkzpZHx1UeRqsHBs_IRYuSo"
  );
  const data = await res.json();
  holidays = data.items?.map(e => e.start?.date).filter(Boolean) || [];
}

function isHoliday(y, m, d) {
  const str = `${y}-${String(m).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
  return holidays.includes(str);
}

function getTrash(day) {
  let date = new Date(year, month - 1, day);
  let wd = date.getDay();
  let week = Math.ceil(day / 7);

  if (wd === 1 || wd === 4) return "🔥";
  if (wd === 2) return "プラ";
  if (wd === 3) {
    if (week === 1 || week === 3) return "ビン・カン";
    if (week === 2 || week === 4) return "電池・破砕";
  }
  if (wd === 5) {
    if (week === 2) return "古着・家電";
    if (week === 4) return "📦";
    if (week === 1 || week === 3) return "ペットボトル";
  }
  return "";
}

onSnapshot(doc(db, "calendar", "shared"), (snap) => {
  if (snap.exists()) {
    const data = snap.data();
    events = data.events || {};
    trashOverrides = data.trashOverrides || {};
    render();
  }
});

async function save() {
  await setDoc(
    doc(db, "calendar", "shared"),
    { events, trashOverrides },
    { merge: true }
  );
}

function render() {
  cal.innerHTML = "";
  document.getElementById("month").innerText = `${year}/${month}`;

  const first = (new Date(year, month - 1, 1).getDay() + 6) % 7;
  const last = new Date(year, month, 0).getDate();
  const today = new Date();

  for (let i = 0; i < first; i++) {
    cal.appendChild(document.createElement("div"));
  }

  for (let d = 1; d <= last; d++) {
    const div = document.createElement("div");
    div.className = "day";

    const date = document.createElement("div");
    date.className = "date";
    date.innerText = d;

    const wd = new Date(year, month - 1, d).getDay();
    if (wd === 0 || wd === 6 || isHoliday(year, month, d)) {
      div.classList.add("holiday");
    }

    if (
      d === today.getDate() &&
      month === today.getMonth() + 1 &&
      year === today.getFullYear()
    ) {
      div.classList.add("today");
    }

    div.appendChild(date);

    if (events[key()]?.[d]) {
      events[key()][d].forEach((e, i) => {
        const ev = document.createElement("div");
        ev.className = "event";
        ev.style.background = e.color || "#999";
        ev.innerText = e.title || "(無題)";

        ev.onclick = (x) => {
          x.stopPropagation();
          selectedDay = d;
          editingIndex = i;

          titleInput.value = e.title || "";
          memoInput.value = e.memo || "";
          setSelectedColor(e.color || "#fa9bbb");

          deleteBtn.style.display = "block";
          openEventModal();
        };

        div.appendChild(ev);
      });
    }

    const next = d + 1;
    if (next <= last) {
      const val = trashOverrides[tkey(next)] ?? getTrash(next);
      if (val) {
        const dot = document.createElement("div");
        dot.className = "nextTrash";
        dot.onclick = (e) => {
          e.stopPropagation();
          selectedDay = next;
          document.getElementById("trashText").innerText = `翌日のゴミ：${val}`;
          trashSelect.value = trashOverrides[tkey(next)] || "";
          openTrashModal();
        };
        div.appendChild(dot);
      }
    }

    div.ondblclick = () => {
      selectedDay = d;
      editingIndex = null;
      titleInput.value = "";
      memoInput.value = "";
      setSelectedColor("#fa9bbb");
      deleteBtn.style.display = "none";
      openEventModal();
    };

    cal.appendChild(div);
  }
}

document.getElementById("save").onclick = async () => {
  const k = key();
  const titleVal = titleInput.value.trim();
  const memoVal = memoInput.value;

  if (!titleVal) return;

  if (!events[k]) events[k] = {};
  if (!events[k][selectedDay]) events[k][selectedDay] = [];

  const obj = { title: titleVal, memo: memoVal, color };

  if (editingIndex !== null) {
    events[k][selectedDay][editingIndex] = obj;
  } else {
    events[k][selectedDay].push(obj);
  }

  await save();
  closeEventModal();
};

deleteBtn.onclick = async () => {
  if (selectedDay === null || editingIndex === null) return;
  if (!confirm("削除する？")) return;

  const k = key();
  const dayEvents = events[k]?.[selectedDay];

  if (!Array.isArray(dayEvents)) return;

  events[k][selectedDay] = dayEvents.filter((_, idx) => idx !== editingIndex);

  if (events[k][selectedDay].length === 0) {
    delete events[k][selectedDay];
  }

  if (Object.keys(events[k]).length === 0) {
    delete events[k];
  }

  editingIndex = null;

  await save();
  render();
  closeEventModal();
};

document.getElementById("trashSave").onclick = async () => {
  const val = trashSelect.value;

  if (val === "" || val === "なし") {
    delete trashOverrides[tkey(selectedDay)];
  } else {
    trashOverrides[tkey(selectedDay)] = val;
  }

  await save();
  closeTrashModal();
};

document.getElementById("close").onclick = () => closeEventModal();
document.getElementById("trashClose").onclick = () => closeTrashModal();

document.getElementById("prev").onclick = async () => {
  month--;
  if (month < 1) {
    month = 12;
    year--;
  }
  render();
};

document.getElementById("next").onclick = async () => {
  month++;
  if (month > 12) {
    month = 1;
    year++;
  }
  render();
};

await fetchHolidays();
render();
</script>

</body>
</html>
