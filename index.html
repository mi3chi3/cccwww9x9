<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar</title>

<style>
body {font-family:sans-serif;margin:0;background:#F7F4F2;}

.header{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:10px;
}

.week,.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  text-align:center;
}

.calendar{padding:10px;gap:6px;}

.day{
  background:white;
  border-radius:12px;
  height:90px;
  padding:5px;
  position:relative;
}

.date{
  width:24px;
  height:24px;
  border-radius:50%;
  line-height:24px;
  margin:auto;
}

.today .date{
  background:red;
  color:white;
}

.trash{
  position:absolute;
  top:4px;
  right:4px;
  opacity:0.4;
  font-size:12px;
}

.event{
  margin-top:4px;
  border-radius:6px;
  font-size:12px;
  padding:2px;
  color:white;
}

.modal{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.3);
}

.hidden{display:none;}

.box{
  background:white;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:300px;
}

.colors{
  display:flex;
  gap:10px;
  margin:10px 0;
}

.color{
  width:32px;
  height:32px;
  border-radius:50%;
}

.selected{outline:3px solid black;}

#delete{
  margin-top:10px;
  background:#ff4d4d;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="header">
<button id="prev">◀</button>
<div id="month"></div>
<button id="next">▶</button>
</div>

<div class="week">
<div>月</div><div>火</div><div>水</div>
<div>木</div><div>金</div><div>土</div><div>日</div>
</div>

<div id="calendar" class="calendar"></div>

<div id="modal" class="modal hidden">
<div class="box">
<input id="title" placeholder="タイトル">

<div class="colors">
<div class="color selected" data="#E8A0B8" style="background:#E8A0B8"></div>
<div class="color" data="#7EC3D8" style="background:#7EC3D8"></div>
<div class="color" data="#F5D547" style="background:#F5D547"></div>
<div class="color" data="#A8E6CF" style="background:#A8E6CF"></div>
</div>

<button id="save">保存</button>
<button id="close">戻る</button>
<button id="delete" style="display:none;">削除</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDLlxAgxvT94--DAiErKdhGsb6-mX8bA8s",
  authDomain: "myc2-fe880.firebaseapp.com",
  projectId: "myc2-fe880",
  storageBucket: "myc2-fe880.firebasestorage.app",
  messagingSenderId: "691622220518",
  appId: "1:691622220518:web:505cc34778cddf91d5e127"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let month=new Date().getMonth()+1;
let year=new Date().getFullYear();
let selectedDay=null;
let editingIndex=null;
let color="#E8A0B8";

let events={};

const cal=document.getElementById("calendar");

function key(){return `${year}-${month}`;}

// 色選択（修正済み）
document.querySelectorAll(".color").forEach(c=>{
  c.onclick=()=>{
    document.querySelectorAll(".color").forEach(x=>x.classList.remove("selected"));
    c.classList.add("selected");
    color=c.getAttribute("data");
  }
});

// リアルタイム監視
function subscribe(){
  onSnapshot(doc(db,"calendar","shared"), (snap)=>{
    if(snap.exists()){
      const data=snap.data();
      events=data.events||{};
      render();
    }
  });
}

// 保存
async function save(){
  if (!selectedDay) return;

  await setDoc(
    doc(db,"calendar","shared"),
    { events },
    { merge: true }
  );
}

// 描画
function render(){
  cal.innerHTML="";
  document.getElementById("month").innerText=`${year}/${month}`;

  let first=(new Date(year,month-1,1).getDay()+6)%7;
  let last=new Date(year,month,0).getDate();
  let today=new Date();
  const k=key();

  for(let i=0;i<first;i++) cal.appendChild(document.createElement("div"));

  for(let d=1;d<=last;d++){
    let div=document.createElement("div");
    div.className="day";

    let date=document.createElement("div");
    date.className="date";
    date.innerText=d;

    if(d===today.getDate()&&month===today.getMonth()+1&&year===today.getFullYear()){
      div.classList.add("today");
    }

    div.appendChild(date);

    if(events[k]?.[d]){
      events[k][d].forEach((e,i)=>{
        let ev=document.createElement("div");
        ev.className="event";
        ev.style.background=e.color || "#999";
        ev.style.color="#fff";
        ev.innerText=e.title;

        ev.onclick=(x)=>{
          x.stopPropagation();
          selectedDay=d;
          editingIndex=i;

          document.getElementById("title").value=e.title;
          color=e.color;

          document.getElementById("delete").style.display="block";
          document.getElementById("modal").classList.remove("hidden");
        };

        div.appendChild(ev);
      });
    }

    div.ondblclick=()=>{
      selectedDay=d;
      editingIndex=null;
      document.getElementById("title").value="";
      document.getElementById("delete").style.display="none";
      document.getElementById("modal").classList.remove("hidden");
    };

    cal.appendChild(div);
  }
}

// 保存ボタン
document.getElementById("save").onclick=async()=>{
  const k=key();
  const title=document.getElementById("title").value;

  if(title){
    if(!events[k])events[k]={};
    if(!events[k][selectedDay])events[k][selectedDay]=[];

    if(editingIndex!==null){
      events[k][selectedDay][editingIndex]={title,color};
    }else{
      events[k][selectedDay].push({title,color});
    }
  }

  editingIndex=null;

  await save();
  document.getElementById("modal").classList.add("hidden");
};

// 削除
document.getElementById("delete").onclick=async()=>{
  if(editingIndex===null) return;

  const k=key();
  events[k][selectedDay].splice(editingIndex,1);

  editingIndex=null;

  await save();
  document.getElementById("modal").classList.add("hidden");
};

// UI操作
document.getElementById("close").onclick=()=>{
  document.getElementById("modal").classList.add("hidden");
};

document.getElementById("prev").onclick=()=>{
  month--;if(month<1){month=12;year--;}
  render();
};

document.getElementById("next").onclick=()=>{
  month++;if(month>12){month=1;year++;}
  render();
};

// 起動
subscribe();
</script>

</body>
</html>
